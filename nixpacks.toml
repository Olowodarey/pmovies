[phases.setup]
nixPkgs = ['nodejs_22']

[phases.install]
cmds = ['pnpm install --frozen-lockfile']

[phases.build]
cmds = ['pnpm --filter backend run prisma:generate', 'pnpm --filter backend run build']

[start]
cmd = 'pnpm --filter backend run prisma:migrate && pnpm --filter backend run start:prod'

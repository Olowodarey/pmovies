[build]
builder = "nixpacks"
buildCommand = "pnpm --filter backend run prisma:generate && pnpm --filter backend run build"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "pnpm --filter backend run prisma:migrate && pnpm --filter backend run start:prod"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
